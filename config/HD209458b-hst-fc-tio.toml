[PATH]
input_file = [
  "../data/HD209458b/HST/new_results_G430L_20030503.h5",
  "../data/HD209458b/HST/new_results_G430L_20030625.h5",
  "../data/HD209458b/HST/new_results_G750L_20030531.h5",
  "../data/HD209458b/HST/new_results_G750L_20030705.h5",
  "../data/HD209458b/HST/WFC3G141_Iraclis_Deming12181.h5", 
]
output_dir = "../results/HD209458b/results-260528-hst-fc-tio/"

[STAR]
reference   = "2017AJ....153..136S"
name        = "HD209458" 
teff        = [6091, 50]
logg        = [4.45, 0.02]
metal       = [0.01, 0.05]
radius_rsun = [1.19, 0.02] 

[PLANET]
reference               = "2017AJ....153..136S"
name                    = "HD209458b"
transit_epoch_bjd       = [2455216.405640, 0.000094]
transit_period_d        = [3.52474859, 0.00000038]
transit_duration_d      = [0.127, 0.0]
radius_rjup             = [1.39, 0.02]  
mass_mjup               = [0.73, 0.04]
equilibrium_temperature = [1459, 12]
circular_orbit          = true

[ATMOSPHERE]
pressure_layers          = 101
pressure_bounds_log10bar = [-6, 2]
wavelength_bounds_micron = [0.298, 1.7]
chemical_species = [
  "TiO", "VO", "H2O", 
]
rayleigh_species  = ["H2", "He"]
continuum_species = ["H2--H2", "H2--He"]
opacity_mode      = "lbl"

[EXOIRIS]
instruments = [ # NO SPACE
  "HST/STIS_G430L", 
  "HST/STIS_G430L", 
  "HST/STIS_G750L", 
  "HST/STIS_G750L", 
  "HST/WFC3_G141",  
]
wl_range_micron   = [ [], [], [], [], []]
time_range_bjd    = [ [], [], [], [], []]
noise_groups      = [0, 0, 1, 1, 2]
n_baselines       = [2, 2, 2, 2, 2] 
rebin_resolutions = [0, 0, 0, 0, 0] # set to 0 for native resolution. 
noise_model        = "white_marginalized"

[PRIORS.TRANSIT]
rho         = ["NP", 1.04, 0.07, 0.7, 1.4, "stellar density", "cgs"]
p           = ["NP", 3.52474859, 0.00000038, 0, inf, "transit period", "days"]
b           = ["NP", 0.5056, 0.0133, 0, 1, "impact parameter", "R_s"]
tc_00       = ["UP", 2459890.15, 2459890.25, -inf, inf, "transit epoch", "BJD_TDB"]

[PRIORS.STAR]
teff        = ["NP", 6091, 50, 5000, 7000, "stellar effective temperature", "K"]
logg        = ["NP", 4.45, 0.02, 4, 5, "stellar gravity", "log10 cgs"]
metal       = ["NP", 0.01, 0.05, -1, 1, "stellar metallicity", ""]

[PRIORS.NOISE]
sigma_m_00  = ["UP", 0.2, 5, -inf, inf, "noise factor 00", ""]
sigma_m_01  = ["UP", 0.2, 5, -inf, inf, "noise factor 01", ""]
sigma_m_02  = ["UP", 0.2, 5, -inf, inf, "noise factor 02", ""] 

[PRIORS.ATMOSPHERE]
mp          = ["NP", 0.73, 0.04, 0.53, 0.93, "planet mass", "M_j"]
ref_p       = ["UP", -6, 2, -inf, inf, "reference pressure", "log10bar"] 
cloud_p     = ["UP", -6, 2, -inf, inf, "cloud-top pressure", "log10bar"] 
cloud_f     = ["UP", 0.0, 1.0, 0, 1.0, "cloud fraction", ""]
temp0       = ["UP", 300, 3000, -inf, inf, "temperature 0", "K"]
x_tio        = ["UP", -12, -1, -inf, inf, "TiO abundance", "log10"]
x_vo         = ["UP", -12, -1, -inf, inf, "VO abundance", "log10"]
x_h2o       = ["UP", -12, -1, -inf, inf, "H2O abundance", "log10"]

[SAMPLER]
method      = "dynesty" 
npools      = 30 
niter_white = 2000
nwalkers    = 60 
# niter_de    = 1000 
# niter_mcmc  = 2000 
bound       = "multi"
sample      = "rwalk"
n_live_points = 240 
n_effective = 400 
dlogz_init  = 0.1
# maxiter_batch = 2000
 